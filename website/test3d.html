<!DOCTYPE html>
<html>
<head>
  <title>Three.js Test</title>
  <style>
    body { margin: 0; background: #04030C; color: white; font-family: monospace; }
    #log { position: fixed; top: 10px; left: 10px; z-index: 999; font-size: 14px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; max-width: 500px; }
    #log div { margin: 2px 0; }
    .ok { color: #00ff88; }
    .err { color: #ff4444; }
    .warn { color: #ffaa00; }
  </style>
</head>
<body>
  <div id="log"></div>
  <script>
    var logEl = document.getElementById('log');
    function log(msg, type) {
      var d = document.createElement('div');
      d.className = type || '';
      d.textContent = msg;
      logEl.appendChild(d);
    }

    log('1. Testing WebGL...');
    var c = document.createElement('canvas');
    var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
    if (gl) {
      log('   WebGL available ✓', 'ok');
    } else {
      log('   WebGL NOT available ✗', 'err');
    }

    log('2. Loading Three.js from jsdelivr...');
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js';
    s.onload = function() {
      log('   Script loaded ✓', 'ok');
      if (window.THREE) {
        log('   window.THREE exists ✓ (revision: ' + THREE.REVISION + ')', 'ok');
        testRender();
      } else {
        log('   window.THREE is undefined ✗', 'err');
      }
    };
    s.onerror = function(e) {
      log('   Script FAILED to load ✗', 'err');
    };
    document.head.appendChild(s);

    function testRender() {
      log('3. Creating scene...');
      try {
        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        
        var renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x04030C);
        document.body.appendChild(renderer.domElement);
        log('   Renderer created ✓', 'ok');

        // Add a sphere
        var geo = new THREE.SphereGeometry(1, 32, 32);
        var mat = new THREE.MeshStandardMaterial({ color: 0xDAA520, emissive: 0xDAA520, emissiveIntensity: 0.1 });
        var sphere = new THREE.Mesh(geo, mat);
        scene.add(sphere);

        // Ring
        var ringGeo = new THREE.RingGeometry(1.5, 2.5, 64);
        var ringMat = new THREE.MeshBasicMaterial({ color: 0xCCBB88, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
        var ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI * 0.4;
        scene.add(ring);

        // Light
        var light = new THREE.DirectionalLight(0xFFE4B5, 1);
        light.position.set(5, 3, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x333344, 0.5));

        // Stars
        var starGeo = new THREE.BufferGeometry();
        var starVerts = new Float32Array(3000);
        for (var i = 0; i < 3000; i++) starVerts[i] = (Math.random() - 0.5) * 100;
        starGeo.setAttribute('position', new THREE.BufferAttribute(starVerts, 3));
        var starMat = new THREE.PointsMaterial({ color: 0xFFFFFF, size: 0.1 });
        scene.add(new THREE.Points(starGeo, starMat));

        log('   Objects added ✓', 'ok');

        function animate() {
          requestAnimationFrame(animate);
          sphere.rotation.y += 0.005;
          ring.rotation.z += 0.003;
          renderer.render(scene, camera);
        }
        animate();
        log('4. Rendering ✓ — You should see a gold planet with ring and stars!', 'ok');
      } catch (e) {
        log('   ERROR: ' + e.message, 'err');
      }
    }
  </script>
</body>
</html>
