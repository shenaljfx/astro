name: Deploy Admin Dashboard

# Build + deploy the god-mode dashboard (dashboard/) to the VM on changes.
# Reuses the same VM secrets as the server/website pipelines.
on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-dashboard
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build SPA & rsync to VM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Build
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync dist/ -> /var/www/grahachara-admin
        run: |
          rsync -rlvz --delete \
            --chmod=D755,F644 \
            --chown=www-data:www-data \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            --rsync-path="sudo rsync" \
            ./dashboard/dist/ \
            "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/var/www/grahachara-admin/"

      - name: Clean up key
        if: always()
        run: rm -f ~/.ssh/deploy_key
