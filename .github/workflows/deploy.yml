name: CI/CD — Server

# Test on every push to main; build + deploy to the VM only if tests pass.
on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'vm-deploy.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Never let two deploys race on the VM.
concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/grahachara-server

jobs:
  # ── 1. Tests / build sanity ────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test --silent

  # ── 2. Build image + push to GHCR ──────────────────────────
  build-and-push:
    name: Build & push image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to the VM + restart ──────────────────────────
  deploy:
    name: Deploy to VM
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Copy deploy script to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: vm-deploy.sh
          target: /home/${{ secrets.VM_USER }}/
      - name: Deploy on VM (pull new image + restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: IMAGE_REF,GHCR_TOKEN,GHCR_USER
          script_stop: true
          script: |
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin
            sudo env IMAGE="$IMAGE_REF" bash "$HOME/vm-deploy.sh"
            sudo docker logout ghcr.io
        env:
          IMAGE_REF: ${{ env.IMAGE }}:${{ needs.build-and-push.outputs.tag }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
