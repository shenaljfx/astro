name: CI/CD — Marketing Studio

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - 'marketing-deploy.sh'
      - '.github/workflows/deploy-marketing.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-marketing
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/grahachara-marketing

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          # ignore-error: a flaky GHA-cache export (containerd ingest race on
          # this big image) must NOT fail the build/deploy — cache is optional.
          cache-to: type=gha,mode=max,ignore-error=true

  deploy:
    name: Deploy to VM
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy deploy script to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: marketing-deploy.sh
          target: /home/${{ secrets.VM_USER }}/
      - name: Deploy on VM (pull new image + restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: IMAGE_REF,GHCR_TOKEN,GHCR_USER
          script_stop: true
          script: |
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin
            sudo env IMAGE="$IMAGE_REF" bash "$HOME/marketing-deploy.sh"
            sudo docker logout ghcr.io
        env:
          IMAGE_REF: ${{ env.IMAGE }}:${{ needs.build-and-push.outputs.tag }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
